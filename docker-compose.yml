services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tfe_backend
    restart: unless-stopped
    environment:
      # DB runs directly on the server host, outside docker-compose.
      DATABASE_URL: ${DATABASE_URL:-}
      PGHOST: ${PGHOST:-host.docker.internal}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-tfe_cycling}
      PGUSER: ${PGUSER:-tfe_user}
      PGPASSWORD: ${PGPASSWORD:-}
      APP_FERNET_KEY: ${APP_FERNET_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-120}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI:-https://nathan.phausman.be/strava}
      STRAVA_SCOPES: ${STRAVA_SCOPES:-read,activity:read_all}
      STRAVA_TOKENS_FILE: ${STRAVA_TOKENS_FILE:-.strava_tokens.json}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./DB/rides:/opt/tfe/DB/rides
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://nathan.phausman.be}
    container_name: tfe_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
